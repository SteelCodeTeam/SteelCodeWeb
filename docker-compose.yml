services:

  # ============================================
  # TRAEFIK — Reverse proxy + HTTPS automático
  # ============================================
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirige HTTP → HTTPS automáticamente
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    networks:
      - web

  # ============================================
  # STEELCODEWEB — Angular app
  # ============================================
  steelcodeweb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: steelcodeweb
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pagweb.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.pagweb.entrypoints=websecure"
      - "traefik.http.routers.pagweb.tls=true"
      - "traefik.http.routers.pagweb.tls.certresolver=letsencrypt"
      - "traefik.http.services.pagweb.loadbalancer.server.port=80"
    networks:
      - web

volumes:
  letsencrypt:

networks:
  web:
    external: false
