<section id="stats" class="stats section section--alt">
  <div class="container">

    <p class="section-label">// 02 · stats</p>

    <div class="stats__grid">
      @for (stat of stats; track stat.label) {
        <div class="stats__item">
          <span class="stats__number">
            {{ stat.current }}<em>{{ stat.suffix }}</em>
          </span>
          <span class="stats__label">{{ stat.label }}</span>
          <span class="stats__description">{{ stat.description }}</span>
        </div>
      }
    </div>

    <!-- Barra de actividad decorativa -->
    <div class="stats__activity">
      <span class="stats__activity-label">// commit activity</span>
      <div class="stats__bars">
        @for (h of barHeights; track $index) {
          <div class="stats__bar" [style.height.%]="h"></div>
        }
      </div>
    </div>

  </div>
</section>
